apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-post-install-proof"
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: akai-proof
          image: "{{ .Values.akai.image | default "ghcr.io/aurekai/akai:latest" }}"
          command:
            - sh
            - -c
            - |
              akai verify --manifest artifact.json --json && \
              akai proof bundle --json
          env:
            - name: AKAI_LOG_LEVEL
              value: "info"
