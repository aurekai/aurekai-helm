apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: akaimodelmemories.aurekai.io
spec:
  group: aurekai.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["modelTag"]
              properties:
                modelTag:
                  type: string
                fpqBits:
                  type: integer
                  default: 8
                saeAudit:
                  type: boolean
                  default: true
                vecIndexNamespace:
                  type: string
                  default: "default"
                image:
                  type: string
                  default: "ghcr.io/aurekai/akai:latest"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Pending", "Compressing", "Auditing", "Indexing", "Ready", "Failed"]
                compressedArtifactId:
                  type: string
                proofUri:
                  type: string
                vecIndexSize:
                  type: integer
      additionalPrinterColumns:
        - name: ModelTag
          type: string
          jsonPath: .spec.modelTag
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: ProofURI
          type: string
          jsonPath: .status.proofUri
  scope: Namespaced
  names:
    plural: akaimodelmemories
    singular: akaimodelmemory
    kind: AkaiModelMemory
    shortNames: ["amm"]
