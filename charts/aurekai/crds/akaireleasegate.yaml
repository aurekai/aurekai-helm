apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: akaireleasegates.aurekai.io
spec:
  group: aurekai.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                strict:
                  type: boolean
                  default: true
                requireProof:
                  type: boolean
                  default: true
                requireDoctorPass:
                  type: boolean
                  default: true
                version:
                  type: string
                image:
                  type: string
                  default: "ghcr.io/aurekai/akai:latest"
            status:
              type: object
              properties:
                passed:
                  type: boolean
                proofUri:
                  type: string
                evaluatedAt:
                  type: string
                  format: date-time
                gateOutput:
                  type: string
      additionalPrinterColumns:
        - name: Passed
          type: boolean
          jsonPath: .status.passed
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: ProofURI
          type: string
          jsonPath: .status.proofUri
  scope: Namespaced
  names:
    plural: akaireleasegates
    singular: akaireleasegate
    kind: AkaiReleaseGate
    shortNames: ["arg"]
