apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: akaipipelineruns.aurekai.io
spec:
  group: aurekai.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["operator"]
              properties:
                operator:
                  type: string
                  description: "Akai operator to run (e.g. 'brief generate')"
                args:
                  type: array
                  items:
                    type: string
                artifactId:
                  type: string
                timeout:
                  type: integer
                  default: 300
                proofRequired:
                  type: boolean
                  default: false
                image:
                  type: string
                  default: "ghcr.io/aurekai/akai:latest"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Pending", "Running", "Succeeded", "Failed"]
                artifactId:
                  type: string
                proofUri:
                  type: string
                exitCode:
                  type: integer
                startTime:
                  type: string
                  format: date-time
                completionTime:
                  type: string
                  format: date-time
      additionalPrinterColumns:
        - name: Operator
          type: string
          jsonPath: .spec.operator
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: ProofURI
          type: string
          jsonPath: .status.proofUri
  scope: Namespaced
  names:
    plural: akaipipelineruns
    singular: akaipipelinerun
    kind: AkaiPipelineRun
    shortNames: ["apr"]
